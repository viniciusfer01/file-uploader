services:
  postgres:
    image: postgres:16-alpine
    container_name: file-uploader-postgres
    environment:
      POSTGRES_DB: file_uploader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: file-uploader-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/uploads;
      /usr/bin/mc anonymous set public local/uploads;
      exit 0;
      "

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: file-uploader-backend
    depends_on:
      - postgres
      - minio-init
    env_file:
      - apps/backend/.env.example
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: file-uploader-frontend
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  postgres_data:
  minio_data:
